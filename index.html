<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Singapore Bridge — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #030810;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .suits { font-size: 28px; letter-spacing: 12px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 900; letter-spacing: 3px; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #93c5fd; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
    .links { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; }
    a.card {
      display: block;
      background: #060e1a;
      border: 1px solid #1a3352;
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      color: #fff;
      transition: border-color 0.15s;
    }
    a.card:hover { border-color: #f59e0b; }
    a.card .label { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    a.card .desc  { font-size: 12px; color: #93c5fd; }
    footer { position: absolute; bottom: 20px; font-size: 11px; color: #374151; }
  </style>
</head>
<body>
  <div class="suits">♠ ♥ ♦ ♣</div>
  <h1>SINGAPORE BRIDGE</h1>
  <p class="sub">Legal Documents</p>

  <div class="links">
    <a class="card" href="privacy.html">
      <div class="label">Privacy Policy</div>
      <div class="desc">How we collect and use your data</div>
    </a>
    <a class="card" href="terms.html">
      <div class="label">Terms of Service</div>
      <div class="desc">Rules for using the app</div>
    </a>
  </div>

  <footer>&copy; 2026 Singapore Bridge</footer>
</body>
</html>
